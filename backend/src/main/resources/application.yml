spring:
  application:
    name: fluxboard-backend
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fluxboard_db}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  address: ${SERVER_HOST:localhost}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION}
    bucket-name: ${AWS_S3_BUCKET}

auth:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-32-byte-minimum-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
    issuer: ${JWT_ISSUER:fluxboard-backend}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

seeddata: ${SEED_DATA}
seed-system-admin-email: ${SEED_SYSTEM_ADMIN_EMAIL}
seed-system-admin-password: ${SEED_SYSTEM_ADMIN_PASSWORD}